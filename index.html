  <header class="header">
    <div class="header-left">
      <button class="menu-btn" id="menuBtn" aria-label="Menu"><span></span></button>
      <div class="chatgpt-title" id="titleBtn">Tekograf AI</div>
    </div>
    <div class="header-right">
      <button class="newchat-top" id="newChatTopBtn" aria-label="Mulai chat baru">+</button>
      <button class="tg-btn" id="telegramBtn" aria-label="Telegram">
        <svg class="telegram-svg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill="currentColor" d="M120 0C53.7 0 0 53.7 0 120s53.7 120 120 120 120-53.7 120-120S186.3 0 120 0zm58.7 80.7-22.6 106.5c-1.7 7.6-6.2 9.5-12.6 5.9l-34.8-25.7-16.8 16.2c-1.9 1.9-3.5 3.5-7.2 3.5l2.5-35.8 65.2-58.9c2.8-2.5-.6-3.9-4.3-1.4l-80.6 50.7-34.7-10.8c-7.5-2.3-7.7-7.5 1.6-11.2l135.8-52.4c6.3-2.3 11.8 1.5 9.5 12.4z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="main">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <aside class="sidebar" id="sidebar">
      <div class="side-top">
        <div class="side-title">Menu</div>
        <button class="side-close" id="sideClose" aria-label="Tutup">✕</button>
      </div>
      <div class="side-actions">
        <button class="side-btn" id="newChatBtn">Mulai chat baru</button>
      </div>
    </aside>

    <section class="content">
      <div class="chat-area" id="chatArea">
        <div class="center-wrap" id="chatWrap">
          <div class="hero" id="hero">
            <div class="image-section" id="imageFeatures">
              <div class="image-stack">
                <div class="image-card"></div>
                <div class="image-card"></div>
                <div class="image-card"></div>
              </div>
              <h1 class="main-title">Tekograf Chat V1.0</h1>
              <p class="subtitle">AiChat tanpa batasan dan tanpa aturan, generasi baru tekograf</p>
            </div>
          </div>
        </div>
      </div>

      <div class="input-container">
        <div class="input-shell">
          <div class="input-wrapper">
            <button class="plus-btn" id="plusBtn" aria-label="Tambah">+</button>
            <textarea
              class="input-field"
              placeholder="Berikan pertanyaan kepada Tekograf"
              id="chatInput"
              rows="1"
              autocomplete="off"
            ></textarea>
            <div class="input-actions">
              <button class="action-btn disabled" id="actionBtn" aria-label="Kirim" disabled>
                <div class="send-glow" aria-hidden="true"></div>
                <svg class="plane" id="sendIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path fill="white" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <div class="toast-dot" aria-hidden="true"></div>
    <div class="toast-text" id="toastText">Fiture ini masih dalam pemeliharaan</div>
    <button class="toast-close" id="toastClose" aria-label="Tutup">✕</button>
  </div>

  <script src="script.js"></script>
</body>
